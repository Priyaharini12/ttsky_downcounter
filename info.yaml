# Tiny Tapeout project information
project:
  title:        "4-bit Down Counter"
  author:       "priyaharini"
  discord:      ""
  description:  "Synchronous 4-bit down counter using Verilog"
  language:     "Verilog"
  clock_hz:     10000000

  # Tile size
  tiles: "1x1"

  # Top module name
  top_module:  "tt_um_example"

  # Source files
  source_files:
    - "project.v"

# Pin description
pinout:

  # Inputs
  ui[0]: "Unused"
  ui[1]: "Unused"
  ui[2]: "Unused"
  ui[3]: "Unused"
  ui[4]: "Unused"
  ui[5]: "Unused"
  ui[6]: "Unused"
  ui[7]: "Unused"

  # Outputs
  uo[0]: "Counter bit 0"
  uo[1]: "Counter bit 1"
  uo[2]: "Counter bit 2"
  uo[3]: "Counter bit 3"
  uo[4]: "Unused"
  uo[5]: "Unused"
  uo[6]: "Unused"
  uo[7]: "Unused"

  # Bidirectional pins
  uio[0]: "Unused"
  uio[1]: "Unused"
  uio[2]: "Unused"
  uio[3]: "Unused"
  uio[4]: "Unused"
  uio[5]: "Unused"
  uio[6]: "Unused"
  uio[7]: "Unused"

# Do not change
yaml_version: 6
